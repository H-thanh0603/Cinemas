services:
  db:
    image: postgres:16-alpine
    container_name: cinestar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinestar
      POSTGRES_PASSWORD: cinestar
      POSTGRES_DB: cinestar
    ports:
      - "5432:5432"
    volumes:
      - cinestar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinestar -d cinestar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cinestar_pg_data:
